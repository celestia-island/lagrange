[package]
name = "lagrange-protocol"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
description = "Platform-neutral comment protocol contract for the lagrange ecosystem"
license = "SySL-1.0"
repository = "https://github.com/celestia-island/lagrange"
keywords = ["comments", "bbs", "protocol", "static-site", "lagrange"]
categories = ["web-programming", "api-bindings"]

[dependencies]
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
chrono = { version = "^0.4", features = ["serde"], default-features = false, optional = true }

[features]
default = ["chrono"]
# Disable chrono to get a pure-serde type set (useful for no_std-ish targets
# and for TS codegen that wants string dates).
chrono = ["dep:chrono"]
