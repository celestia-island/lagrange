name: Checks

on:
  push:
    branches: [master, dev]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt -p lagrange-library -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
