name: Release binaries
on:
  push:
    tags: [v*]
  workflow_dispatch:

# Builds the `lagrange` binary for three targets and uploads tar.gz archives
# to the GitHub Release. The archives are fetched at install time by
# `create-lagrange` (npm) and are cargo-binstall compatible (the
# [package.metadata.binstall] block in Cargo.toml declares the URL pattern).

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../lagrange-${{ github.ref_name }}-${{ matrix.target }}.tar.gz lagrange
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../lagrange-${{ github.ref_name }}-${{ matrix.target }}.zip lagrange.exe
          cd ../../..

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lagrange-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            lagrange-${{ github.ref_name }}-${{ matrix.target }}.zip
