[package]
name = "lagrange-library"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
authors = ["langyo <langyo.china@gmail.com>"]
publish = false
description = "Lagrange — a pest-based markdown documentation rendering facility, powered by tairitsu and hikari"
license-file = "LICENSE"
repository = "https://github.com/celestia-island/lagrange"
keywords = ["documentation", "markdown", "ssg", "pest", "rendering"]
categories = ["command-line-utilities", "text-processing", "web-programming"]
exclude = ["docs/", "justfile", ".github/"]

[lib]
name = "lagrange_library"
path = "src/lib.rs"

[[bin]]
name = "lagrange"
path = "src/main.rs"

[dependencies]
anyhow = "^1"
clap = { version = "^4", features = ["derive"] }
pest = "^2"
pest_derive = "^2"
# Unified logging (matching the tairitsu/shirebe/kou ecosystem convention).
tracing = "^0.1"
tracing-subscriber = { version = "^0.3", features = ["env-filter"] }
chrono = "^0.4"
# JSON for the embedded multi-language page data.
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
toml = "^0.8"

# Dev server: axum + tower-http ServeDir for static file serving.
axum = "^0.8"
tokio = { version = "^1", features = ["net", "rt-multi-thread", "macros"] }
tower-http = { version = "^0.6", features = ["fs"] }

# Rendering IR: tairitsu virtual DOM (lightweight, server-side render-to-HTML).
tairitsu-vdom = { git = "https://github.com/celestia-island/tairitsu.git", branch = "dev" }
# Theming: hikari color palette.
hikari-palette = { git = "https://github.com/celestia-island/hikari.git", branch = "dev" }
hikari-icons = { git = "https://github.com/celestia-island/hikari.git", branch = "dev", default-features = false }
